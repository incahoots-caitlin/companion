<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Companion</title>
    <link rel="preload" href="fonts/Geist-Variable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="fonts/GeistMono-Variable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="vendor/open-props.min.css" />
    <link rel="stylesheet" href="styles/design-system/primitives.css" />
    <link rel="stylesheet" href="styles/design-system/tokens.css" />
    <link rel="stylesheet" href="styles/design-system/forms.css" />
    <link rel="stylesheet" href="styles/design-system/buttons.css" />
    <link rel="stylesheet" href="styles/design-system/modals.css" />
    <link rel="stylesheet" href="styles/design-system/pills.css" />
    <link rel="stylesheet" href="styles/design-system/banners.css" />
    <link rel="stylesheet" href="styles/design-system/toasts.css" />
    <link rel="stylesheet" href="styles/design-system/layouts.css" />
    <link rel="stylesheet" href="styles/design-system/animations.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/design-system/global-search.css" />
    <script type="module" src="/main.js?v=0.40.0" defer></script>
  </head>
  <body>
    <aside class="sidebar" role="navigation" aria-label="Companion navigation">
      <div class="sidebar-brand">
        <img class="brand-mark" src="assets/logo-morph.gif" alt="In Cahoots" />
        <div class="brand-tag">COMPANION</div>
      </div>

      <div class="sidebar-section">
        <a class="sidebar-item active" data-view="today" aria-current="page">Today</a>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Products</div>
        <a class="sidebar-item" data-view="cool">COOL</a>
        <a class="sidebar-item" data-view="context">Context</a>
      </div>

      <div class="sidebar-section" data-section="studio">
        <div class="sidebar-label">Companion</div>
        <!-- Client items are rendered by client/sidebar.js on app launch.
             Airtable-driven, cached 60s. Pipeline link stays under them. -->
        <div class="sidebar-empty">Loading clients...</div>
        <a class="sidebar-item" data-view="pipeline">Pipeline</a>
        <a class="sidebar-item" data-view="team">Team</a>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Personal</div>
        <a class="sidebar-item" data-view="studio-cfo">Studio CFO</a>
        <a class="sidebar-item" data-view="mba">MBA</a>
        <a class="sidebar-item" data-view="fundraising">Fundraising</a>
        <a class="sidebar-item" data-view="social-launch">Social launch</a>
      </div>

      <div class="sidebar-section sidebar-section-bottom">
        <a class="sidebar-item" id="settings-link" data-view="settings">Settings</a>
      </div>
    </aside>

    <main class="main">
      <!-- v0.36 Block F — global search bar. Sticks to the top of the
           main pane regardless of which view is active. Cmd-K focuses
           the input. Results render into the dropdown below. -->
      <div class="global-search" id="global-search">
        <div class="global-search-input-wrap">
          <span class="global-search-icon" aria-hidden="true">⌕</span>
          <input
            type="search"
            id="global-search-input"
            class="global-search-input"
            placeholder="Search Conversations, Receipts, Notes, Decisions, Commitments..."
            autocomplete="off"
            spellcheck="false"
            aria-label="Search Companion"
          />
          <kbd class="global-search-kbd" aria-hidden="true">⌘K</kbd>
        </div>
        <div class="global-search-dropdown" id="global-search-dropdown" hidden></div>
      </div>

      <section id="today-view">
        <header class="main-header">
          <div class="main-title">Today</div>
          <div class="header-actions">
            <button class="button-icon" id="today-refresh-btn" title="Refresh dashboard" aria-label="Refresh dashboard">
              <span aria-hidden="true">↻</span>
            </button>
            <button class="button button-secondary" id="workflows-btn">Skills</button>
            <button class="button" id="strategic-thinking-btn">Start Strategic Thinking</button>
          </div>
        </header>

        <div id="today-sections" class="today-sections"></div>

        <div class="section-label today-workflows-label">Quick skills</div>
        <section class="workflow-starters workflow-starters-compact" id="today-quick-skills">
          <!-- Populated by main.js from skills/registry.js (today_quick context) -->
        </section>
        <div class="today-skills-overflow-row">
          <button class="button button-secondary" type="button" id="more-skills-btn">More skills...</button>
        </div>

        <div class="section-label" hidden>Recent receipts</div>
        <section class="feed" id="feed" hidden></section>
      </section>

      <section id="client-view" hidden></section>
      <section id="subcontractor-view" hidden></section>
    </main>
  </body>
</html>
